<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>25</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="status-bar">
        <div class="system-info-left">con amør</div>
        <div class="system-info-right">
            <span id="clock">00:00</span>
            <span class="battery">100% 🔋</span>
        </div>
    </div>

    <main class="desktop">
        <div class="app-icon" onclick="openApp('San Jorge')">
            <div class="icon-img" style="background-image: url('SJ.jpg'); background-size: cover;"></div>
            <span>SJ</span>
        </div>
        <div class="app-icon" onclick="openApp('Galería')">
            <div class="icon-img galeria"></div>
            <span>Videos</span>
        </div>
        <div class="app-icon" onclick="openApp('Notas')">
            <div class="icon-img notas"></div>
            <span>Notas</span>
        </div>
        <div class="app-icon" onclick="openApp('export')">
            <div class="icon-img export"></div>
            <span>EXPORTS</span>
        </div>
        <div class="app-icon" onclick="openApp('Musica')">
            <div class="icon-img" style="background-image: url('musica.png'); background-size: cover;"></div>
            <span>Música</span>
        </div>
        <div class="app-icon" onclick="openApp('Safari')">
            <div class="icon-img safari-icon"></div>
            <span>Internet</span>
        </div>
        <div class="app-icon" onclick="openApp('Papelera')">
            <div class="icon-img papelera"></div>
            <span>Papelera</span>
        </div>
    </main>

    <div class="dock-container">
        <nav class="dock">
            <div class="dock-item" onclick="openApp('Notas')">
                <div class="icon-img notas"></div>
                <div class="dot"></div>
            </div>
            <div class="dock-item" onclick="openApp('Galería')">
                <div class="icon-img galeria"></div>
                <div class="dot"></div>
            </div>
            <div class="dock-item" onclick="openApp('Safari')">
                <div class="icon-img safari-icon"></div>
                <div class="dot"></div>
            </div>
            <div class="dock-item" onclick="openApp('Papelera')">
                <div class="icon-img papelera"></div>
                <div class="dot"></div>
            </div>
        </nav>
    </div>

    <div id="custom-window" class="window-overlay" style="display: none;">
        <div class="window-container">
            <div class="window-header">
                <div class="header-controls">
                    <span class="dot-close" onclick="closeCustomApp()"></span>
                </div>
                <span id="window-title" class="window-title">Cargando...</span>
            </div>
            <div class="window-content" id="app-content-area"></div>
            
            <audio id="bg-music" loop><source src="nosotros.mp3" type="audio/mpeg"></audio>
            <audio id="safari-music" loop><source src="noHayManera.m4a" type="audio/mp4"></audio>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
