<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cupido OS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="status-bar">
        <div class="system-info-left">Cupido's Desktop</div>
        <div class="system-info-right">
            <span id="clock">00:00</span>
            <span class="battery">100% 🔋</span>
        </div>
    </div>

    <main class="desktop">
        <div class="app-icon" onclick="openApp('Galería')">
            <div class="icon-img galeria"></div>
            <span>Galería</span>
        </div>
        <div class="app-icon" onclick="openApp('Amor')">
            <div class="icon-img amor"></div>
            <span>EXPORTS_Amor</span>
        </div>
        <div class="app-icon" onclick="openApp('Papelera')">
            <div class="icon-img papelera"></div>
            <span>Papelera</span>
        </div>
        <div class="app-icon" onclick="openApp('Notas')">
            <div class="icon-img notas"></div>
            <span>Notas</span>
        </div>
    </main>

    <div class="dock-wrapper">
        <nav class="dock">
            <div class="dock-item" onclick="openApp('Safari')">🧭</div>
            <div class="dock-item" onclick="openApp('Chat')">💬</div>
            <div class="dock-item" onclick="openApp('Config')">⚙️</div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
